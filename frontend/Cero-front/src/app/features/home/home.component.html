<div class="home-entero">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-forma hero-forma--uno"></div>
    <div class="hero-forma hero-forma--dos"></div>

    <div class="hero-alineacion">


      <h1>{{ 'home.examples' | translate }}</h1>
      <p>{{ 'home.description' | translate }}</p>

      <div class="hero-nota">
        <p>{{ 'home.note' | translate }}</p>
      </div>
    </div>
  </div>

  <!-- Grid de proyectos -->
  <div class="home-alineacion">
    <div class="grid-proyectos">
      @for (proyecto of proyectos; track proyecto.route) {
        <button [routerLink]="proyecto.route" class="tarjeta" [style.--color-acento]="proyecto.color" [style.--color-fondo]="proyecto.colorFondo">

          <span class="tarjeta-icono">
            @switch (proyecto.icon) {
              @case ('portfolio') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <rect x="3" y="7" width="18" height="13" rx="2" />
                  <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                </svg>
              }
              @case ('informativa') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <circle cx="12" cy="12" r="9" />
                  <path d="M12 8h.01M11 12h1v5h1" />
                </svg>
              }
              @case ('ecommerce') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M3 6h2l1.3 9.4A2 2 0 0 0 8.3 17h8.4a2 2 0 0 0 2-1.7L20 8H6" />
                  <circle cx="9" cy="20" r="1.4" />
                  <circle cx="17" cy="20" r="1.4" />
                </svg>
              }
              @case ('dashboard') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <rect x="3" y="3" width="8" height="8" rx="1.5" />
                  <rect x="13" y="3" width="8" height="5" rx="1.5" />
                  <rect x="13" y="10" width="8" height="11" rx="1.5" />
                  <rect x="3" y="13" width="8" height="8" rx="1.5" />
                </svg>
              }
              @case ('blog') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M4 5h13a2 2 0 0 1 2 2v12H6a2 2 0 0 1-2-2V5Z" />
                  <path d="M8 9h7M8 13h7M8 17h4" />
                </svg>
              }
              @case ('landing') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M4 4h16v4H4z" />
                  <path d="M8 12h8M8 16h5" />
                  <circle cx="7" cy="6" r=".6" fill="currentColor" stroke="none" />
                </svg>
              }
              @case ('reservas') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <rect x="3" y="5" width="18" height="16" rx="2" />
                  <path d="M3 10h18M8 3v4M16 3v4" />
                  <path d="m9 15 2 2 4-4" />
                </svg>
              }
              @case ('saas') {
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M7 15a4 4 0 0 1 0-8 5 5 0 0 1 9.6-1.5A4.5 4.5 0 0 1 17 15H7Z" />
                </svg>
              }
            }
          </span>

          <span class="tarjeta-categoria">{{ proyecto.categoryKey | translate }}</span>
          <h2>{{ proyecto.titleKey | translate }}</h2>
          <p>{{ proyecto.descKey | translate }}</p>

          <span class="tarjeta-flecha">
            {{ 'home.viewExample' | translate }}
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </span>

        </button>
      }
    </div>
  </div>

  <!-- Cierre cercano -->
  <div class="home-cierre">
    <div class="cierre-alineacion">
      <h2>{{ 'home.closing.title' | translate }}</h2>
      <p>{{ 'home.closing.text' | translate }}</p>
    </div>
  </div>

</div>
